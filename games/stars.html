<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>合成星星</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf0 50%, #dfe6ed 100%);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

        .top-bar {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            z-index: 10;
        }

        .top-bar .back-btn {
            font-size: 1.4rem;
            text-decoration: none;
            color: rgba(0,0,0,0.45);
            padding: 4px 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .top-bar .back-btn:hover {
            background: rgba(0,0,0,0.06);
        }

        .score-area {
            text-align: center;
        }

        .score-area .label {
            font-size: 0.7rem;
            color: rgba(0,0,0,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-area .score {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #f5af19, #e94560);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .best-score {
            font-size: 0.75rem;
            color: rgba(0,0,0,0.35);
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .next-star {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: rgba(0,0,0,0.4);
        }

        .next-star .preview {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        #gameCanvas {
            border-radius: 12px;
            border: 2px solid rgba(0,0,0,0.08);
            background: rgba(255,255,255,0.5);
            touch-action: none;
        }

        .drop-line {
            position: absolute;
            top: 0;
            width: 2px;
            height: 100%;
            background: rgba(0,0,0,0.1);
            pointer-events: none;
            transition: left 0.05s linear;
            display: none;
        }

        /* Game Over Overlay */
        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        .game-over.show {
            display: flex;
        }

        .game-over h2 {
            font-size: 2rem;
            color: #fff;
        }

        .game-over .final-score {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.8);
        }

        .game-over .restart-btn {
            padding: 12px 36px;
            font-size: 1rem;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #f5af19, #e94560);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .game-over .restart-btn:hover {
            transform: scale(1.05);
        }

        /* Merge animation */
        .merge-effect {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            animation: mergeExpand 0.4s ease-out forwards;
        }

        @keyframes mergeExpand {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a class="back-btn" href="../index.html">&larr;</a>
        <div class="score-area">
            <div class="label">得分</div>
            <div class="score" id="score">0</div>
        </div>
        <div class="best-score" id="bestScore">最佳: 0</div>
    </div>

    <div class="game-container" id="gameContainer">
        <div class="next-star">
            <span>下一个:</span>
            <div class="preview" id="nextPreview"></div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="game-over" id="gameOver">
        <h2>游戏结束</h2>
        <div class="final-score" id="finalScore">得分: 0</div>
        <button class="restart-btn" id="restartBtn">再来一局</button>
    </div>

    <script>
    (function() {
        'use strict';

        // === Star Config ===
        const STAR_LEVELS = [
            { level: 1, radius: 16, emoji: '✦', color: '#ffb3b3', glow: '#e63946' },
            { level: 2, radius: 22, emoji: '★', color: '#ffd6a0', glow: '#e87d2f' },
            { level: 3, radius: 28, emoji: '⭐', color: '#fff3cc', glow: '#feca57' },
            { level: 4, radius: 34, emoji: '🌟', color: '#e0ffe0', glow: '#48dbfb' },
            { level: 5, radius: 40, emoji: '💫', color: '#e0f0ff', glow: '#0abde3' },
            { level: 6, radius: 46, emoji: '🔯', color: '#e8e0ff', glow: '#a55eea' },
            { level: 7, radius: 52, emoji: '✨', color: '#ffe0f5', glow: '#fd79a8' },
            { level: 8, radius: 58, emoji: '🌠', color: '#e0ffff', glow: '#00cec9' },
            { level: 9, radius: 64, emoji: '🌌', color: '#f0e0ff', glow: '#6c5ce7' },
            { level: 10, radius: 70, emoji: '☀️', color: '#fffff0', glow: '#fdcb6e' },
        ];

        // === Physics Constants ===
        const GRAVITY = 0.5;
        const AIR_FRICTION = 0.998;
        const BOUNCE = 0.4;
        const BALL_RESTITUTION = 0.2;
        const FLOOR_FRICTION = 0.99;
        const ROLLING_THRESHOLD = 0.3;

        // === Game State ===
        let canvas, ctx;
        let canvasWidth = 360;
        let canvasHeight = 560;
        let stars = [];
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('stars_best') || '0');
        let currentLevel = 1;
        let nextLevel = 1;
        let gameRunning = false;
        let canDrop = true;
        let dropX = canvasWidth / 2;
        let gameOverChecked = false;
        let mergeEffects = [];

        // === DOM Elements ===
        const scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('bestScore');
        const nextPreviewEl = document.getElementById('nextPreview');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');
        const gameContainer = document.getElementById('gameContainer');

        // === Init ===
        function init() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');

            // Responsive sizing
            const maxW = Math.min(window.innerWidth - 20, 400);
            canvasWidth = maxW;
            canvasHeight = Math.min(window.innerHeight - 160, 600);
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            canvas.style.width = canvasWidth + 'px';
            canvas.style.height = canvasHeight + 'px';

            bestScoreEl.textContent = '最佳: ' + bestScore;
            setupEvents();
            startGame();
        }

        function startGame() {
            stars = [];
            score = 0;
            mergeEffects = [];
            gameRunning = true;
            canDrop = true;
            gameOverChecked = false;
            gameOverEl.classList.remove('show');
            scoreEl.textContent = '0';
            generateNext();
            updateNextPreview();
            requestAnimationFrame(gameLoop);
        }

        function generateNext() {
            currentLevel = nextLevel;
            // Only spawn levels 1-4 randomly
            nextLevel = Math.floor(Math.random() * 4) + 1;
        }

        function updateNextPreview() {
            const star = STAR_LEVELS[nextLevel - 1];
            nextPreviewEl.textContent = star.emoji;
            nextPreviewEl.style.background = star.color;
            nextPreviewEl.style.boxShadow = '0 0 8px ' + star.glow;
        }

        // === Events ===
        function setupEvents() {
            canvas.addEventListener('mousemove', (e) => {
                if (!canDrop || !gameRunning) return;
                const rect = canvas.getBoundingClientRect();
                dropX = e.clientX - rect.left;
                dropX = Math.max(STAR_LEVELS[currentLevel - 1].radius, Math.min(canvasWidth - STAR_LEVELS[currentLevel - 1].radius, dropX));
            });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!canDrop || !gameRunning) return;
                const rect = canvas.getBoundingClientRect();
                dropX = e.touches[0].clientX - rect.left;
                dropX = Math.max(STAR_LEVELS[currentLevel - 1].radius, Math.min(canvasWidth - STAR_LEVELS[currentLevel - 1].radius, dropX));
            }, { passive: false });

            canvas.addEventListener('click', (e) => {
                if (!canDrop || !gameRunning) return;
                dropStar();
            });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                if (!canDrop || !gameRunning) return;
                dropStar();
            });

            restartBtn.addEventListener('click', startGame);
        }

        function dropStar() {
            canDrop = false;
            const config = STAR_LEVELS[currentLevel - 1];
            const star = {
                x: dropX,
                y: config.radius + 10,
                vx: 0,
                vy: 0,
                radius: config.radius,
                level: currentLevel,
                emoji: config.emoji,
                color: config.color,
                glow: config.glow,
                merged: false,
                settled: false,
                dropTime: Date.now()
            };
            stars.push(star);
            generateNext();
            updateNextPreview();

            // Delay before next drop
            setTimeout(() => {
                canDrop = true;
            }, 500);
        }

        // === Physics ===
        function updatePhysics() {
            for (let i = 0; i < stars.length; i++) {
                const s = stars[i];
                if (s.merged) continue;

                // Gravity
                s.vy += GRAVITY;
                s.vx *= AIR_FRICTION;
                s.vy *= AIR_FRICTION;

                s.x += s.vx;
                s.y += s.vy;

                // Floor collision
                if (s.y + s.radius > canvasHeight) {
                    s.y = canvasHeight - s.radius;
                    s.vy *= -BOUNCE;
                    s.vx *= FLOOR_FRICTION;
                    if (Math.abs(s.vy) < 1) s.vy = 0;
                    // Rolling: slow friction on floor
                    if (Math.abs(s.vx) < ROLLING_THRESHOLD) s.vx = 0;
                }

                // Wall collisions
                if (s.x - s.radius < 0) {
                    s.x = s.radius;
                    s.vx *= -BOUNCE;
                }
                if (s.x + s.radius > canvasWidth) {
                    s.x = canvasWidth - s.radius;
                    s.vx *= -BOUNCE;
                }
            }

            // Star-to-star collisions (multiple iterations for stability)
            for (let iter = 0; iter < 3; iter++) {
                for (let i = 0; i < stars.length; i++) {
                    for (let j = i + 1; j < stars.length; j++) {
                        const a = stars[i];
                        const b = stars[j];
                        if (a.merged || b.merged) continue;

                        const dx = b.x - a.x;
                        const dy = b.y - a.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const minDist = a.radius + b.radius;

                        if (dist < minDist) {
                            // Check merge
                            if (a.level === b.level && a.level < 10) {
                                mergeStar(a, b);
                            } else {
                                // Elastic collision with rolling
                                resolveCollision(a, b, dx, dy, dist, minDist);
                            }
                        }
                    }
                }
            }

            // Remove merged stars
            stars = stars.filter(s => !s.merged);

            // Enforce boundaries after ball-to-ball collision resolution
            for (let i = 0; i < stars.length; i++) {
                const s = stars[i];
                if (s.merged) continue;
                if (s.y + s.radius > canvasHeight) {
                    s.y = canvasHeight - s.radius;
                    if (s.vy > 0) s.vy = 0;
                }
                if (s.x - s.radius < 0) {
                    s.x = s.radius;
                    if (s.vx < 0) s.vx = 0;
                }
                if (s.x + s.radius > canvasWidth) {
                    s.x = canvasWidth - s.radius;
                    if (s.vx > 0) s.vx = 0;
                }
            }

        }

        function resolveCollision(a, b, dx, dy, dist, minDist) {
            if (dist === 0) {
                dist = 1;
                dx = (Math.random() - 0.5) * 2;
                dy = -1;
            }
            const nx = dx / dist;
            const ny = dy / dist;
            const overlap = minDist - dist;

            // Position separation: floor balls are immovable
            let sepMassA = a.radius * a.radius;
            let sepMassB = b.radius * b.radius;
            const onFloorA = a.y + a.radius >= canvasHeight - 2;
            const onFloorB = b.y + b.radius >= canvasHeight - 2;
            if (onFloorA) sepMassA = 1e10;
            if (onFloorB) sepMassB = 1e10;

            const total = sepMassA + sepMassB;

            // Velocity along collision normal
            const relVx = a.vx - b.vx;
            const relVy = a.vy - b.vy;
            const relVn = relVx * nx + relVy * ny;

            if (relVn < 1.0) {
                if (overlap < 1.0) return;
                // Resting contact: push apart, floor balls don't move in Y
                a.x -= nx * overlap * (sepMassB / total);
                b.x += nx * overlap * (sepMassA / total);
                if (!onFloorA && !onFloorB) {
                    a.y -= ny * overlap * (sepMassB / total);
                    b.y += ny * overlap * (sepMassA / total);
                } else if (onFloorA && !onFloorB) {
                    b.y += ny * overlap;
                } else if (!onFloorA && onFloorB) {
                    a.y -= ny * overlap;
                }
                return;
            }

            a.x -= nx * overlap * (sepMassB / total);
            b.x += nx * overlap * (sepMassA / total);
            if (!onFloorA && !onFloorB) {
                a.y -= ny * overlap * (sepMassB / total);
                b.y += ny * overlap * (sepMassA / total);
            } else if (onFloorA && !onFloorB) {
                b.y += ny * overlap;
            } else if (!onFloorA && onFloorB) {
                a.y -= ny * overlap;
            }

            // --- Normal impulse ---
            let impMassA = a.radius * a.radius;
            let impMassB = b.radius * b.radius;

            const restitution = relVn < 1.5 ? 0 : BALL_RESTITUTION;
            const normalImpulse = -(1 + restitution) * relVn / (1 / impMassA + 1 / impMassB);

            a.vx += normalImpulse / impMassA * nx;
            a.vy += normalImpulse / impMassA * ny;
            b.vx -= normalImpulse / impMassB * nx;
            b.vy -= normalImpulse / impMassB * ny;

            // --- Sideways effects: only for active collisions, not resting contacts ---
            // This prevents slow creep when balls are barely moving
            if (relVn > 2.0) {
                const massA = a.radius * a.radius;
                const massB = b.radius * b.radius;
                const tx = -ny;
                const ty = nx;
                const rollDir = Math.abs(nx) > 0.01 ? (nx >= 0 ? 1 : -1) : (Math.random() < 0.5 ? 1 : -1);

                // Rolling: both balls roll sideways on contact
                const rollFactor = Math.abs(ny) * 0.2;
                const rollImpulse = relVn * rollFactor / (1 / massA + 1 / massB);

                a.vx -= rollImpulse / massA * tx * rollDir;
                a.vy -= rollImpulse / massA * ty * rollDir;
                b.vx += rollImpulse / massB * tx * rollDir;
                b.vy += rollImpulse / massB * ty * rollDir;

                // Impact push: hit ball gets extra sideways push from the impact
                const aIsUpper = a.y < b.y;
                const pushFactor = Math.abs(ny) * 0.15;
                const pushImpulse = relVn * pushFactor / (1 / massA + 1 / massB);
                if (aIsUpper) {
                    b.vx += pushImpulse / massB * tx * rollDir;
                } else {
                    a.vx += pushImpulse / massA * tx * rollDir;
                }
            }

            // Floor constraint: absorb downward velocity
            if (onFloorA && a.vy > 0) a.vy = 0;
            if (onFloorB && b.vy > 0) b.vy = 0;
        }

        function mergeStar(a, b) {
            const newLevel = a.level + 1;
            const config = STAR_LEVELS[newLevel - 1];

            // Create merged star at midpoint
            const newStar = {
                x: (a.x + b.x) / 2,
                y: (a.y + b.y) / 2,
                vx: (a.vx + b.vx) / 2,
                vy: (a.vy + b.vy) / 2 - 2,
                radius: config.radius,
                level: newLevel,
                emoji: config.emoji,
                color: config.color,
                glow: config.glow,
                merged: false,
                settled: false,
                dropTime: Date.now()
            };

            a.merged = true;
            b.merged = true;
            stars.push(newStar);

            // Score
            const points = newLevel * newLevel * 10;
            score += points;
            scoreEl.textContent = score;

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('stars_best', bestScore.toString());
                bestScoreEl.textContent = '最佳: ' + bestScore;
            }

            // Visual effect
            mergeEffects.push({
                x: newStar.x,
                y: newStar.y,
                radius: config.radius,
                color: config.glow,
                time: Date.now()
            });
        }

        // === Check Game Over ===
        function checkGameOver() {
            // If any star is above the danger line and has been settled
            const dangerY = 60;
            for (const s of stars) {
                if (s.merged) continue;
                const age = Date.now() - s.dropTime;
                if (age > 2000 && s.y - s.radius < dangerY && Math.abs(s.vy) < 1) {
                    endGame();
                    return;
                }
            }
        }

        function endGame() {
            gameRunning = false;
            finalScoreEl.textContent = '得分: ' + score;
            gameOverEl.classList.add('show');
        }

        // === Render ===
        function render() {
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);

            // Danger line
            ctx.strokeStyle = 'rgba(255, 50, 50, 0.3)';
            ctx.setLineDash([8, 4]);
            ctx.beginPath();
            ctx.moveTo(0, 60);
            ctx.lineTo(canvasWidth, 60);
            ctx.stroke();
            ctx.setLineDash([]);

            // Drop guide
            if (canDrop && gameRunning) {
                ctx.strokeStyle = 'rgba(0,0,0,0.1)';
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                ctx.moveTo(dropX, 0);
                ctx.lineTo(dropX, canvasHeight);
                ctx.stroke();
                ctx.setLineDash([]);

                // Preview star
                const config = STAR_LEVELS[currentLevel - 1];
                ctx.globalAlpha = 0.6;
                drawStar(dropX, config.radius + 10, config);
                ctx.globalAlpha = 1.0;
            }

            // Draw stars
            for (const s of stars) {
                if (s.merged) continue;
                drawStar(s.x, s.y, s);
            }

            // Merge effects
            const now = Date.now();
            mergeEffects = mergeEffects.filter(e => now - e.time < 400);
            for (const e of mergeEffects) {
                const progress = (now - e.time) / 400;
                ctx.globalAlpha = 0.6 * (1 - progress);
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius * (1 + progress * 1.5), 0, Math.PI * 2);
                ctx.fillStyle = e.color;
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        function drawStar(x, y, config) {
            // Round to full pixels to prevent sub-pixel icon jitter
            x = Math.round(x);
            y = Math.round(y);

            // Glow
            ctx.shadowColor = config.glow;
            ctx.shadowBlur = 12;

            // Body circle
            const gradient = ctx.createRadialGradient(x - config.radius * 0.3, y - config.radius * 0.3, 0, x, y, config.radius);
            gradient.addColorStop(0, config.color);
            gradient.addColorStop(1, config.glow);
            ctx.beginPath();
            ctx.arc(x, y, config.radius, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            ctx.shadowBlur = 0;

            // Emoji - use white fill with stroke for text-based symbols (levels 1,2)
            const fontSize = config.radius * 0.9;
            ctx.font = fontSize + 'px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            if (config.level <= 2) {
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 2;
                ctx.strokeText(config.emoji, x, y + 1);
                ctx.fillStyle = '#ffffff';
            } else {
                ctx.fillStyle = '#ffffff';
            }
            ctx.fillText(config.emoji, x, y + 1);
        }

        // === Game Loop ===
        function gameLoop() {
            if (!gameRunning) return;

            updatePhysics();
            checkGameOver();
            render();
            requestAnimationFrame(gameLoop);
        }

        // === Start ===
        window.addEventListener('load', init);
        window.addEventListener('resize', () => {
            const maxW = Math.min(window.innerWidth - 20, 400);
            canvasWidth = maxW;
            canvasHeight = Math.min(window.innerHeight - 160, 600);
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            canvas.style.width = canvasWidth + 'px';
            canvas.style.height = canvasHeight + 'px';
        });
    })();
    </script>
</body>
</html>
