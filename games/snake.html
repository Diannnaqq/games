<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf0 50%, #dfe6ed 100%);
            color: #333;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 16px;
            font-size: 0.9rem;
            border: 1px solid rgba(0,0,0,0.12);
            border-radius: 8px;
            background: rgba(255,255,255,0.7);
            color: rgba(0,0,0,0.5);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.9);
            border-color: rgba(0,0,0,0.2);
            color: #333;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 12px;
            font-size: 1rem;
            color: rgba(0,0,0,0.45);
        }

        .score-bar span {
            color: #27ae60;
            font-weight: bold;
        }

        canvas {
            border-radius: 12px;
            background: rgba(255,255,255,0.5);
            border: 2px solid rgba(0,0,0,0.08);
            display: block;
            margin: 0 auto;
        }

        .controls {
            margin-top: 16px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .controls button {
            padding: 10px 24px;
            font-size: 0.95rem;
            border: 1px solid rgba(0,0,0,0.12);
            border-radius: 10px;
            background: rgba(255,255,255,0.7);
            color: #333;
            cursor: pointer;
            transition: all 0.2s;
        }

        .controls button:hover {
            background: rgba(255,255,255,0.9);
            border-color: rgba(0,0,0,0.2);
        }

        .controls button:disabled {
            opacity: 0.4;
            cursor: default;
        }

        /* 移动端方向键 */
        .mobile-dpad {
            display: none;
            margin-top: 16px;
            position: relative;
            width: 160px;
            height: 160px;
            margin-left: auto;
            margin-right: auto;
        }

        .dpad-btn {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.12);
            background: rgba(255,255,255,0.7);
            color: #444;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            transition: background 0.15s;
        }

        .dpad-btn:active {
            background: rgba(255,255,255,0.95);
        }

        .dpad-up    { top: 0; left: 50%; transform: translateX(-50%); }
        .dpad-down  { bottom: 0; left: 50%; transform: translateX(-50%); }
        .dpad-left  { left: 0; top: 50%; transform: translateY(-50%); }
        .dpad-right { right: 0; top: 50%; transform: translateY(-50%); }

        /* 游戏叠加层 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.7);
            border-radius: 12px;
            z-index: 10;
        }

        .overlay h2 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: #333;
        }

        .overlay p {
            color: rgba(0,0,0,0.5);
            margin-bottom: 16px;
        }

        .overlay button {
            padding: 10px 28px;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.15s;
        }

        .overlay button:hover {
            transform: scale(1.05);
        }

        .canvas-wrap {
            position: relative;
            display: inline-block;
        }

        /* 速度选择 */
        .speed-selector {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .speed-btn {
            padding: 5px 14px;
            font-size: 0.8rem;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.5);
            color: rgba(0,0,0,0.4);
            cursor: pointer;
            transition: all 0.2s;
        }

        .speed-btn.active {
            background: rgba(67, 233, 123, 0.15);
            border-color: rgba(67, 233, 123, 0.5);
            color: #27ae60;
        }

        @media (max-width: 500px) {
            .mobile-dpad {
                display: block;
            }
        }
    </style>
</head>
<body>
    <a class="back-btn" href="../index.html">&#8592; 返回</a>

    <div class="game-container">
        <h1>贪吃蛇</h1>
        <div class="score-bar">
            <div>得分: <span id="score">0</span></div>
            <div>最高: <span id="best">0</span></div>
        </div>

        <div class="canvas-wrap">
            <canvas id="gameCanvas"></canvas>
            <div class="overlay" id="startOverlay">
                <h2>贪吃蛇</h2>
                <p>用方向键控制蛇的移动</p>
                <button id="startBtn">开始游戏</button>
            </div>
            <div class="overlay" id="gameoverOverlay" style="display:none;">
                <h2>游戏结束</h2>
                <p>得分: <span id="finalScore">0</span></p>
                <button id="retryBtn">再来一局 (R)</button>
            </div>
        </div>

        <div class="controls">
            <button id="pauseBtn" disabled>暂停 (空格)</button>
        </div>

        <div class="speed-selector">
            <button class="speed-btn" data-speed="140" data-index="0">慢速 (Q)</button>
            <button class="speed-btn active" data-speed="100" data-index="1">普通</button>
            <button class="speed-btn" data-speed="65" data-index="2">快速 (E)</button>
        </div>

        <div class="mobile-dpad">
            <div class="dpad-btn dpad-up" data-dir="up">&#9650;</div>
            <div class="dpad-btn dpad-down" data-dir="down">&#9660;</div>
            <div class="dpad-btn dpad-left" data-dir="left">&#9664;</div>
            <div class="dpad-btn dpad-right" data-dir="right">&#9654;</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 响应式画布尺寸
        const GRID = 20;
        let COLS, ROWS;

        function resizeCanvas() {
            const maxW = Math.min(window.innerWidth - 40, 480);
            const maxH = Math.min(window.innerHeight - 320, 480);
            const size = Math.min(maxW, maxH);
            COLS = Math.floor(size / GRID);
            ROWS = Math.floor(size / GRID);
            canvas.width = COLS * GRID;
            canvas.height = ROWS * GRID;
        }
        resizeCanvas();

        // 游戏状态
        let snake, direction, nextDirection, food, score, bestScore, gameInterval, speed, paused, gameRunning;

        bestScore = parseInt(localStorage.getItem('snakeBest') || '0');
        document.getElementById('best').textContent = bestScore;
        speed = 100;

        function initGame() {
            const cx = Math.floor(COLS / 2);
            const cy = Math.floor(ROWS / 2);
            snake = [
                { x: cx, y: cy },
                { x: cx - 1, y: cy },
                { x: cx - 2, y: cy }
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            paused = false;
            gameRunning = true;
            document.getElementById('score').textContent = score;
            document.getElementById('pauseBtn').disabled = false;
            document.getElementById('pauseBtn').textContent = '暂停 (空格)';
            placeFood();
        }

        function placeFood() {
            let pos;
            do {
                pos = {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS)
                };
            } while (snake.some(s => s.x === pos.x && s.y === pos.y));
            food = pos;
        }

        function startGame() {
            resizeCanvas();
            initGame();
            document.getElementById('startOverlay').style.display = 'none';
            document.getElementById('gameoverOverlay').style.display = 'none';
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, speed);
            draw();
        }

        function gameLoop() {
            if (paused) return;

            direction = nextDirection;

            const head = { ...snake[0] };
            switch (direction) {
                case 'up':    head.y--; break;
                case 'down':  head.y++; break;
                case 'left':  head.x--; break;
                case 'right': head.x++; break;
            }

            // 碰墙检测
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                return gameOver();
            }

            // 碰自身检测
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                return gameOver();
            }

            snake.unshift(head);

            // 吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                placeFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制网格背景
            ctx.strokeStyle = 'rgba(0,0,0,0.05)';
            ctx.lineWidth = 0.5;
            for (let x = 0; x <= COLS; x++) {
                ctx.beginPath();
                ctx.moveTo(x * GRID, 0);
                ctx.lineTo(x * GRID, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= ROWS; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * GRID);
                ctx.lineTo(canvas.width, y * GRID);
                ctx.stroke();
            }

            // 绘制食物
            const fx = food.x * GRID + GRID / 2;
            const fy = food.y * GRID + GRID / 2;
            const foodRadius = GRID / 2 - 2;

            // 食物光晕
            const glow = ctx.createRadialGradient(fx, fy, 0, fx, fy, GRID);
            glow.addColorStop(0, 'rgba(255, 107, 107, 0.3)');
            glow.addColorStop(1, 'rgba(255, 107, 107, 0)');
            ctx.fillStyle = glow;
            ctx.fillRect(food.x * GRID - GRID / 2, food.y * GRID - GRID / 2, GRID * 2, GRID * 2);

            // 食物本体
            const foodGrad = ctx.createRadialGradient(fx - 2, fy - 2, 1, fx, fy, foodRadius);
            foodGrad.addColorStop(0, '#ff9f9f');
            foodGrad.addColorStop(1, '#ff6b6b');
            ctx.beginPath();
            ctx.arc(fx, fy, foodRadius, 0, Math.PI * 2);
            ctx.fillStyle = foodGrad;
            ctx.fill();

            // 绘制蛇
            snake.forEach((seg, i) => {
                const sx = seg.x * GRID;
                const sy = seg.y * GRID;
                const pad = i === 0 ? 1 : 2;
                const r = 4;

                const t = i / snake.length;
                const g1 = lerpColor('#43e97b', '#38f9d7', t);
                const g2 = lerpColor('#38f9d7', '#4facfe', t);

                const segGrad = ctx.createLinearGradient(sx, sy, sx + GRID, sy + GRID);
                segGrad.addColorStop(0, g1);
                segGrad.addColorStop(1, g2);

                ctx.fillStyle = segGrad;
                roundRect(ctx, sx + pad, sy + pad, GRID - pad * 2, GRID - pad * 2, r);
                ctx.fill();

                // 蛇头眼睛
                if (i === 0) {
                    ctx.fillStyle = '#0a0a2e';
                    const cx = sx + GRID / 2;
                    const cy = sy + GRID / 2;
                    let e1x, e1y, e2x, e2y;
                    const ed = 4; // eye distance from center
                    const es = 2; // eye size

                    switch (direction) {
                        case 'right':
                            e1x = cx + ed; e1y = cy - ed;
                            e2x = cx + ed; e2y = cy + ed;
                            break;
                        case 'left':
                            e1x = cx - ed; e1y = cy - ed;
                            e2x = cx - ed; e2y = cy + ed;
                            break;
                        case 'up':
                            e1x = cx - ed; e1y = cy - ed;
                            e2x = cx + ed; e2y = cy - ed;
                            break;
                        case 'down':
                            e1x = cx - ed; e1y = cy + ed;
                            e2x = cx + ed; e2y = cy + ed;
                            break;
                    }
                    ctx.beginPath();
                    ctx.arc(e1x, e1y, es, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(e2x, e2y, es, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function lerpColor(c1, c2, t) {
            const r1 = parseInt(c1.slice(1, 3), 16);
            const g1 = parseInt(c1.slice(3, 5), 16);
            const b1 = parseInt(c1.slice(5, 7), 16);
            const r2 = parseInt(c2.slice(1, 3), 16);
            const g2 = parseInt(c2.slice(3, 5), 16);
            const b2 = parseInt(c2.slice(5, 7), 16);
            const r = Math.round(r1 + (r2 - r1) * t);
            const g = Math.round(g1 + (g2 - g1) * t);
            const b = Math.round(b1 + (b2 - b1) * t);
            return `rgb(${r},${g},${b})`;
        }

        function gameOver() {
            gameRunning = false;
            clearInterval(gameInterval);
            document.getElementById('pauseBtn').disabled = true;

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('snakeBest', bestScore);
                document.getElementById('best').textContent = bestScore;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameoverOverlay').style.display = 'flex';
        }

        function togglePause() {
            if (!gameRunning) return;
            paused = !paused;
            document.getElementById('pauseBtn').textContent = paused ? '继续 (空格)' : '暂停 (空格)';
        }

        // 键盘控制（使用捕获阶段，确保overlay按钮获得焦点时仍能响应）
        document.addEventListener('keydown', (e) => {
            // R键重新开始，所有状态下均有效
            if (e.key === 'r' || e.key === 'R') {
                startGame();
                return;
            }

            if (!gameRunning) return;

            // Q减速，E加速
            if (e.key === 'q' || e.key === 'Q') { changeSpeed(currentSpeedIndex - 1); return; }
            if (e.key === 'e' || e.key === 'E') { changeSpeed(currentSpeedIndex + 1); return; }

            const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
            let newDir = null;

            switch (e.key) {
                case 'ArrowUp':    case 'w': case 'W': newDir = 'up'; break;
                case 'ArrowDown':  case 's': case 'S': newDir = 'down'; break;
                case 'ArrowLeft':  case 'a': case 'A': newDir = 'left'; break;
                case 'ArrowRight': case 'd': case 'D': newDir = 'right'; break;
                case ' ': togglePause(); e.preventDefault(); return;
            }

            if (newDir && newDir !== opposites[direction]) {
                nextDirection = newDir;
                e.preventDefault();
            }
        }, true);

        // 按钮事件
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('retryBtn').addEventListener('click', startGame);
        document.getElementById('pauseBtn').addEventListener('click', togglePause);

        // 速度选择
        const speedBtns = document.querySelectorAll('.speed-btn');
        let currentSpeedIndex = 1;

        function changeSpeed(newIndex) {
            if (newIndex < 0 || newIndex >= speedBtns.length) return;
            currentSpeedIndex = newIndex;
            speedBtns.forEach(b => b.classList.remove('active'));
            speedBtns[currentSpeedIndex].classList.add('active');
            speed = parseInt(speedBtns[currentSpeedIndex].dataset.speed);
            if (gameRunning && !paused) {
                clearInterval(gameInterval);
                gameInterval = setInterval(gameLoop, speed);
            }
        }

        speedBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                changeSpeed(parseInt(btn.dataset.index));
            });
        });

        // 移动端方向键
        document.querySelectorAll('.dpad-btn').forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (!gameRunning) return;
                const dir = btn.dataset.dir;
                const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
                if (dir !== opposites[direction]) {
                    nextDirection = dir;
                }
            });
            btn.addEventListener('click', () => {
                if (!gameRunning) return;
                const dir = btn.dataset.dir;
                const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
                if (dir !== opposites[direction]) {
                    nextDirection = dir;
                }
            });
        });

        // 触摸滑动控制
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        canvas.addEventListener('touchend', (e) => {
            if (!gameRunning) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };

            if (Math.abs(dx) > Math.abs(dy)) {
                const dir = dx > 0 ? 'right' : 'left';
                if (dir !== opposites[direction]) nextDirection = dir;
            } else {
                const dir = dy > 0 ? 'down' : 'up';
                if (dir !== opposites[direction]) nextDirection = dir;
            }
        }, { passive: true });

        // 窗口缩放
        window.addEventListener('resize', () => {
            if (!gameRunning) {
                resizeCanvas();
                draw();
            }
        });
    </script>
</body>
</html>
